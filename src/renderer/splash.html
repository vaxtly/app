<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:"
    />
    <title>Vaxtly</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #060c18;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        -webkit-app-region: drag;
        user-select: none;
      }

      .content {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: fadeIn 0.4s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        width: 72px;
        height: 72px;
        border-radius: 16px;
      }

      .app-name {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-top: 16px;
        color: #f1f5f9;
      }

      .status {
        position: absolute;
        bottom: 28px;
        font-size: 12px;
        color: #475569;
        transition: opacity 0.2s ease;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <img class="logo" src="./assets/logo.png" alt="" />
      <div class="app-name">Vaxtly</div>
    </div>
    <div class="status" id="status">Starting...</div>
    <script>
      window.splashApi?.onStatus((text) => {
        document.getElementById('status').textContent = text
      })
    </script>
  </body>
</html>
